{% load static %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | CloudDriveX</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h3 class="project-title">Cloud-Based Document Management System</h3>
        <h2>🔐 Login to CloudDriveX</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <p class="auth-link">
            Don’t have an account? 
            <a href="{% url 'register' %}">Create Account</a>
        </p>

        <div class="auth-footer">
            Cloud Based Document Management System <br>
            Developed by <b>Shafak Imam</b>
        </div>

    </div>

</div>

</body>
</html>
